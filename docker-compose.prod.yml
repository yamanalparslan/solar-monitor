# Production override — kullanım:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Bu dosya production ortamına özgü override'ları içerir.

services:
  solar-collector:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  solar-monitor:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    environment:
      - LOG_LEVEL=WARNING
