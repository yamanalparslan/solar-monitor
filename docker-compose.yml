# ===================================================
# Solar Monitor — Docker Compose (v2)
# ===================================================
# Tüm servisleri tek komutla başlatır:
#   docker-compose up -d
#
# Servisler:
#   panel            → Streamlit Dashboard    (:8501)
#   collector        → Async Modbus Collector  (collector_async.py)
#   api              → FastAPI REST API       (:8503)
#   healthcheck      → HTTP Health Endpoint   (:8502)
#   prometheus-exp   → Metrik Exporter        (:9100)
# ===================================================

x-common: &common
  build: .
  restart: unless-stopped
  env_file: .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ./data:/app/data
    - ./backups:/app/backups
    # Üretim güvenliği: Kaynak kodun tamamı host'tan bağlanmaz. Image üzerinden çalışır.
    # NOT: pgdata volume'u yalnizca solar-postgres servisine mount edilir.
  environment:
    - PYTHONUNBUFFERED=1

services:
  # ─── PostgreSQL / TimescaleDB ───
  solar-postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: solar_postgres
    restart: unless-stopped
    # zaman kolonu TIMESTAMP WITHOUT TIME ZONE ve uygulama yerel saat (Istanbul)
    # yaziyor. PG varsayilan UTC'de calisinca NOW() ile karsilastiran her sorgu
    # 3 saat kayiyordu. Sunucu saatini uygulamayla hizaliyoruz.
    command: [ "postgres", "-c", "timezone=Europe/Istanbul" ]
    ports:
      # Guvenlik: DB portu yalnizca localhost'a acilir; konteynerler ic agdan erisir.
      - "127.0.0.1:5432:5432"
    environment:
      - TZ=Europe/Istanbul
      - POSTGRES_USER=${POSTGRES_USER:-solar_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-solar_pass_2026}
      - POSTGRES_DB=${POSTGRES_DB:-solar_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solar_user} -d ${POSTGRES_DB:-solar_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Veri Toplayıcı (Async - Ana Collector) ───
  solar-collector:
    <<: *common
    container_name: solar_collector
    # collector_async.py artık ana collector dosyasıdır.
    # - Her metrik için holding (FC3) + input (FC4) + blok okuma fallback dener
    # - to_signed16 ile voltaj/akım signed değer desteği
    # - decode_temperature_register ile otomatik sıcaklık scale tespiti
    # - Tüm slave'leri asyncio.gather ile paralel okur
    entrypoint: [ "python", "collector_async.py" ]
    depends_on:
      solar-postgres:
        condition: service_healthy
    # Veri tazeligi kontrolu: collector ayakta gorunup veri yazmiyorsa
    # unhealthy olur ve asagidaki restart politikasi devreye girer.
    # (Image'dan miras kalan Streamlit healthcheck'i bu servis icin gecersizdi.)
    healthcheck:
      test: [ "CMD", "python", "healthcheck.py" ]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 120s

  # ─── Ana Dashboard ───
  solar-monitor:
    <<: *common
    container_name: solar_monitor_pro
    entrypoint: [ "streamlit", "run", "1_PANEL.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true", "--server.fileWatcherType=none" ]
    ports:
      - "8501:8501"
    depends_on:
      solar-collector:
        condition: service_started
      solar-postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── REST API ───
  solar-api:
    <<: *common
    container_name: solar_api
    ports:
      - "8503:8503"
    entrypoint: [ "python", "api.py" ]
    environment:
      - PYTHONUNBUFFERED=1
      - API_PORT=8503
    depends_on:
      solar-collector:
        condition: service_started
      solar-postgres:
        condition: service_healthy
    # Kok endpoint API anahtari gerektirmez; servisin ayakta oldugunu dogrular.
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8503/')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Healthcheck Endpoint ───
  solar-healthcheck:
    <<: *common
    container_name: solar_healthcheck
    restart: unless-stopped
    ports:
      - "8502:8502"
    # --serve: kalici HTTP endpoint (/health). Onceden tek seferlik betik
    # calistigi icin exit 0 verip restart dongusune giriyordu.
    entrypoint: [ "python", "healthcheck.py", "--serve" ]
    environment:
      - PYTHONUNBUFFERED=1
      - HEALTH_PORT=8502
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8502/health')" ]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 120s

  # ─── Prometheus Exporter ───
  solar-prometheus:
    <<: *common
    container_name: solar_prometheus
    ports:
      - "9100:9100"
    entrypoint: [ "python", "prometheus_exporter.py" ]
    environment:
      - PYTHONUNBUFFERED=1
      - PROMETHEUS_PORT=9100
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/metrics')" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Grafana Dashboard ───
  solar-grafana:
    image: grafana/grafana:10.4.0
    container_name: solar_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Lutfen .env dosyasinda GRAFANA_PASSWORD belirleyin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - solar-prometheus

  # ─── MQTT Broker ───
  solar-mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: solar_mosquitto
    restart: unless-stopped
    ports:
      # Güvenlik: Sadece iç ağa (localhost) publish et, dışarı açma
      - "127.0.0.1:1883:1883"
    environment:
      - MQTT_USER=${MQTT_USER:-solaradmin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:?Lutfen .env dosyasinda MQTT_PASSWORD belirleyin}
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    command: >
      sh -c "touch /tmp/passwd && mosquitto_passwd -b /tmp/passwd $${MQTT_USER} $${MQTT_PASSWORD} && exec mosquitto -c /mosquitto/config/mosquitto.conf"

  # ─── MQTT Dinleyici ───
  solar-mqtt-listener:
    <<: *common
    container_name: solar_mqtt_listener
    restart: unless-stopped
    depends_on:
      - solar-mosquitto
    entrypoint: [ "python", "mqtt_listener.py" ]
    # Image'dan miras kalan Streamlit healthcheck'i bu servis icin anlamsiz
    # (8501 portunu dinlemiyor) — kalici 'unhealthy' gorunmesine yol aciyordu.
    healthcheck:
      disable: true

  # ─── Otomatik Veritabani Yedekleme ───
  solar-backup:
    image: timescale/timescaledb:latest-pg15
    container_name: solar_backup
    restart: unless-stopped
    # pg_dump sunucuyla ayni surumde olsun diye ayni TimescaleDB imaji kullanilir.
    entrypoint: [ "/bin/sh", "/backup.sh" ]
    volumes:
      - ./backup.sh:/backup.sh:ro
      - ./backups:/backups
    environment:
      - POSTGRES_HOST=solar-postgres
      - POSTGRES_USER=${POSTGRES_USER:-solar_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-solar_pass_2026}
      - POSTGRES_DB=${POSTGRES_DB:-solar_db}
      - BACKUP_TIME=${BACKUP_TIME:-02:30}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - TZ=Europe/Istanbul
    depends_on:
      solar-postgres:
        condition: service_healthy

volumes:
  pgdata:

